<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        .container{
background-color: aqua;
height: 500px;
width: 100%;

/* justify-content: right; */
        }
        #one{
background-color: rgb(214, 17, 125);
height: 100px;
width:20%;
border: 2px solid black;
border-radius: 15px;
position: relative;
top: 10px;
left: 5px;
animation-name: rightAnimation;
animation-duration: 7s;
animation-timing-function: linear;
/* animation-fill-mode: forwards; */
animation-delay: 2s;
/* animation-iteration-count: infinite; */
/* animation-direction: normal; */
/* justify-self: center; */
animation-direction: alternate;
animation-play-state: running;


        }
        @keyframes rightAnimation{
     from{
top:10px;
left: 0px;
     }
     to{
top:10px;
left: 600px;
     }
        }
        #two{
background-color: chartreuse;
height: 100px;
width:20%;
border: 2px solid black;
border-radius: 15px;
position: relative;
/* justify-self: center; */
top:240px ;
left: 600px;
animation-name: leftAnimation;
animation-duration: 7s;
animation-timing-function: linear;
animation-delay: 2s;
/* animation-iteration-count: infinite; */
animation-direction: alternate-reverse;


        }
         @keyframes leftAnimation{
            from{
                top: 240px;
                left: 600;
            }
            to{
                top: 240px;
                left: 0px;
            }
          /* 0%   {background-color:red; left:0px; top:0px;}
  25%  {background-color:yellow; left:400px; top:0px;}
  50%  {background-color:blue; left:400px; top:400px;}
  75%  {background-color:green; left:0px; top:400px;}
  100% {background-color:red; left:0px; top:0px;} */
    }
    #three{
background-color: rgb(63, 22, 209);
height: 100px;
width:100px;
border: 2px solid black;
border-radius: 50px;
position: relative;
top: 2px;
left: 300px;
animation-name: circleAnimation;
animation-duration: 7s;
animation-timing-function: linear;
/* animation-fill-mode: forwards; */
animation-delay: 2s;
/* animation-iteration-count: infinite; */
/* animation-direction: normal; */
/* justify-self: center; */
animation-direction:alternate-reverse;
animation-play-state: running;
        }
        
@keyframes circleAnimation{
 0%   {background-color:red; left:300px; top: 2px;}
  25%  {background-color:yellow; left:500px; top:2px;}
  50%  {background-color:blue; left:500px; top:50px;}
  75%  {background-color:green; left:300px; top:50px;}
  100% {background-color:red; left:300px; top:2px;} 
}

        </style>
        </head>
        <body>
            <div class="container">
                <div id="one"></div>
                <div id="two"></div>
                <div id="three"></div>
            </div>
        </body>
        </html>
